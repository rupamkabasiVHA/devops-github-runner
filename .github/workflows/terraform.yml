name: Platform Pipeline (Terraform + Runner Build)

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ACCOUNT_ID: 640344572675
  ECR_REPOSITORY: devops-runner

jobs:

  # ✅ Job 1 — Terraform
  terraform:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS (OIDC Infra Role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::640344572675:role/github-infra-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Init
        run: terraform init
        working-directory: terraform

      - name: Plan
        run: terraform plan
        working-directory: terraform

      - name: Apply
        run: terraform apply -auto-approve
        working-directory: terraform

  # ✅ Job 2 — Build Runner Image (depends on Terraform)
  build-runner:
    runs-on: ubuntu-latest
    needs: terraform   # 🔥 THIS CREATES DEPENDENCY

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS (OIDC Infra Role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::640344572675:role/github-infra-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t $ECR_REPOSITORY:latest ./runner

      - name: Tag Image
        run: |
          docker tag $ECR_REPOSITORY:latest $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest

      - name: Push Image
        run: |
          docker push $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest